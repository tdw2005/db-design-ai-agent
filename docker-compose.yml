services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: db-design-agent-app
    env_file:
      - .env
    volumes:
      - ./:/app
    working_dir: /app
    command: ["sh", "-c", "python -m app.init_db && tail -f /dev/null"]
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: db-design-agent-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  mysql_data:
